<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endi & Febri Wedding</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  text-align: center;
  background: #fffaf5;
}

.cover {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: #f3e5d8;
}

button {
  padding: 12px 20px;
  border: none;
  background: #b08968;
  color: white;
  font-size: 16px;
  border-radius: 8px;
}

.section {
  padding: 20px;
}

a {
  display: inline-block;
  margin: 10px;
  padding: 10px 15px;
  background: #6d6875;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}
</style>

</head>

<body>

<div class="cover" id="cover">
  <h2>Undangan Pernikahan</h2>
  <h1>Endi & Febri</h1>
  <button onclick="openInvite()">Buka Undangan</button>
</div>

<div id="content" style="display:none">

<div class="section">
  <h2>💍 Endi & Febri</h2>
  <p>Sabtu, 13 Juni 2026</p>
</div>

<div class="section">
  <h3>Akad & Resepsi</h3>
  <p>08.00 WIB - selesai</p>
  <p>Ajibarang Wetan Kaliumbul RT01/RW01</p>
  <a href="https://maps.app.goo.gl/ab6ojW8SH8rfHP6b9">Lihat Lokasi</a>
</div>

<div class="section">
  <h3>Tasyakuran (Pria)</h3>
  <p>Sawangan Mungguan RT02/RW01</p>
  <a href="https://maps.app.goo.gl/9p3QMvvodjFgqtmo6">Lihat Lokasi</a>
</div>

<div class="section">
  <p>Terima kasih atas doa dan kehadirannya</p>
</div>

</div>

<script>
function openInvite() {
  document.getElementById("cover").style.display = "none";
  document.getElementById("content").style.display = "block";
}
</script>

</body>
  </html>
